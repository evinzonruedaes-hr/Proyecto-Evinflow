<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvinFlow - Clientes</title>
<link rel="stylesheet" href="clientes.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR (igual al del dashboard) -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">Evin<span>Flow</span></div>

        <nav class="nav-menu">
            <a href="../dashboard/dashboard.html" class="nav-item">Dashboard</a>
            <a href="clientes.html" class="nav-item activo">Clientes</a>
            <a href="../proyectos/proyectos.html" class="nav-item">Proyectos</a>
            <a href="../presupuesto/presupuestos.html" class="nav-item">Presupuestos</a>
            <a href="../tareas/tareas.html" class="nav-item">Tareas</a>
            <a href="/perfil/perfil.html" class="nav-item">Configuración</a>
        </nav>

        <div class="sidebar-usuario">
            <p class="nombre">Stiven Rueda</p>
            <p class="rol">Administrador</p>
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <input type="text" class="buscador" placeholder="Buscar...">
        <div class="topbar-derecha">
            <span class="icono">🔔</span>
            <div class="avatar">S</div>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="contenido">

        <div class="encabezado-pagina">
            <div>
            <h1>Clientes</h1>
            <p>Gestiona la información de tus clientes.</p>
            </div>

        <button class="btn-primario" id="btnNuevoCliente">+ Nuevo cliente</button>
        </div>

        <!-- BARRA DE BUSQUEDA-->
        <div class="barra-tabla">
            <input type="text" id="buscadorClientes" class="input-busqueda" placeholder="Buscar cliente por nombre o correo...">
        </div>

        <!-- TABLA DE CLINTES -->
        <div class="panel">
            <table class="tabla-datos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Empresa</th>
                        <th>Fecha de registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <!--
                    Este <tbody> ahora se llena con JavaScript (ver clientes.js).
                    Los 3 clientes de ejemplo que antes estaban escritos aquí a
                    mano ahora viven en un arreglo dentro de clientes.js, y una
                    función se encarga de dibujarlos. Por eso queda vacío.
                -->
                <tbody id="tablaClientesBody"></tbody>
            </table>
            <p class="mensaje-vacio oculto" id="mensajeSinClientes">
                
            </p>
        </div>

    </main>

    <div class="overlay-formulario oculto" id="formularioCliente">
        <div class="caja-formulario">
            <h2 id="tituloFormulario">Nuevo cliente</h2>

            <form id="formCliente">
                <div class="campo">
                    <label for="nombreCliente">Nombre</label>
                    <input type="text" id="nombreCliente" name="nombre" required>
                </div>

                <div class="campo">
                    <label for="correoCliente">Correo</label>
                    <input type="email" id="correoCliente" name="correo" required>
                </div>

                <div class="campo">
                    <label for="telefonoCliente">Teléfono</label>
                    <input type="tel" id="telefonoCliente" name="telefono" required>
                </div>

                <div class="campo">
                    <label for="empresaCliente">Empresa (opcional)</label>
                    <input type="text" id="empresaCliente" name="empresa">
                </div>

                <div class="botones-formulario">
                    <button type="button" class="btn-secundario" id="btnCancelarCliente">Cancelar</button>
                    <button type="submit" class="btn-primario">Guardar cliente</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="clientes.js"></script>

</body>
</html>
