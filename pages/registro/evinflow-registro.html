<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvinFlow · Crear cuenta</title>
<link rel="stylesheet" href="evinflow-registro.css">
</head>
<body>

  <!-- ================= PANEL IZQUIERDO — MARCA ================= -->
  <aside class="panel-marca">
    <div class="logo-fila">
      <span class="logo-texto">EVIN<span>FLOW</span></span>
    </div>

    <div class="marca-centro">
      <h1>Organiza tu trabajo,<br>mantén el <span class="acento">flujo</span>.</h1>
      <p>Plataforma integral para la gestión de clientes, proyectos y presupuestos. Todo en flujo, todo en orden.</p>
    </div>
  </aside>

  <!-- ================= PANEL DERECHO — FORMULARIO ================= -->
  <main class="panel-form">
    <div class="form-caja">
      <span class="form-eyebrow">Acceso a la plataforma</span>
      <h2>Crea tu cuenta</h2>
      <p class="subtitulo">Regístrate para empezar a organizar tu trabajo.</p>

      <form>
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
        </div>

        <div class="campo">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
        </div>

        <div class="campo">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
        </div>

        <div class="campo">
          <label for="confirmarContrasena">Confirmar contraseña</label>
          <input type="password" id="confirmarContrasena" name="confirmarContrasena" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-principal">Crear cuenta</button>
      </form>

      <p class="iniciosesion">¿Ya tienes una cuenta? <a href="../inicio_sesion/evinflow-login.html">Inicia sesión</a></p>
    </div>
  </main>

</body>
</html>
